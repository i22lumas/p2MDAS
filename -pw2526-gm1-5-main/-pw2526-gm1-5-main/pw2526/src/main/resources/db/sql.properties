# =============================================================================
# CONFIGURACIÓN DE CONSULTAS SQL - CLUB NÁUTICO
# =============================================================================

# =============================================================================
# SOCIOS
# =============================================================================
socios.existe.dni=SELECT COUNT(*) FROM Socios WHERE dni = ?
socios.insertar=INSERT INTO Socios (nombre, apellidos, dni, fecha_nacimiento, direccion, fecha_inscripcion, tiene_titulo_patron, tipo_miembro, inscripcion_id, id_socio_titular_fk) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)
socios.buscar.id=SELECT * FROM Socios WHERE id_socio = ?
socios.buscar.dni=SELECT * FROM Socios WHERE dni = ?
socios.obtener.por.inscripcion=SELECT * FROM Socios WHERE inscripcion_id = ?
socios.actualizar.titulo.patron=UPDATE Socios SET tiene_titulo_patron = ? WHERE dni = ?
socios.obtener.todos=SELECT * FROM Socios ORDER BY fecha_inscripcion DESC
socios.obtener.con.titulo.patron=SELECT * FROM Socios WHERE tiene_titulo_patron = true
socios.actualizar.inscripcion=UPDATE Socios SET inscripcion_id = ? WHERE id_socio = ?
socios.actualizar.titular.fk=UPDATE Socios SET id_socio_titular_fk = ? WHERE id_socio = ?

# =============================================================================
# INSCRIPCIONES
# =============================================================================
inscripciones.insertar=INSERT INTO Inscripciones (id_socio_titular, tipo_inscripcion, cuota_anual, fecha_creacion) VALUES (?, ?, ?, ?)
inscripciones.ultimo.id=SELECT LAST_INSERT_ID()
inscripciones.buscar.id=SELECT * FROM Inscripciones WHERE id_inscripcion = ?
inscripciones.buscar.por.titular=SELECT * FROM Inscripciones WHERE id_socio_titular = ?
inscripciones.actualizar.tipo=UPDATE Inscripciones SET tipo_inscripcion = ? WHERE id_inscripcion = ?
inscripciones.actualizar.cuota=UPDATE Inscripciones SET cuota_anual = ? WHERE id_inscripcion = ?
inscripciones.obtener.todas=SELECT * FROM Inscripciones ORDER BY fecha_creacion DESC
inscripciones.contar.socios=SELECT COUNT(*) FROM Socios WHERE inscripcion_id = ?
inscripciones.contar.familiares=SELECT COUNT(*) FROM Socios WHERE inscripcion_id = ? AND tipo_miembro <> 'TITULAR'

# =============================================================================
# EMPLEADOS / PATRONES
# =============================================================================
empleados.insertar=INSERT INTO Empleado (dni, nombre, apellidos, fecha_nacimiento, fecha_expedicion_titulo) VALUES (?, ?, ?, ?, ?)
empleados.buscar.por_dni=SELECT * FROM Empleado WHERE dni = ?
empleados.obtener.todos=SELECT * FROM Empleado ORDER BY apellidos, nombre
empleados.obtener.disponibles=SELECT e.* FROM Empleado e WHERE e.id_empleado NOT IN (SELECT emb.id_patron_asignado FROM Embarcaciones emb WHERE emb.id_patron_asignado IS NOT NULL)
empleados.buscar.por.id=SELECT * FROM Empleado WHERE id_empleado = ?

# =============================================================================
# EMBARCACIONES
# =============================================================================
embarcaciones.insertar=INSERT INTO Embarcaciones (matricula, tipo_embarcacion, nombre, numero_plazas, dimensiones) VALUES (?, ?, ?, ?, ?)
embarcaciones.buscar.por_matricula=SELECT * FROM Embarcaciones WHERE UPPER(TRIM(matricula)) = ?
embarcaciones.buscar.por_tipo=SELECT * FROM Embarcaciones WHERE tipo_embarcacion = ? ORDER BY nombre
embarcaciones.obtener.todas=SELECT * FROM Embarcaciones
embarcaciones.obtener.con.patron=SELECT e.*, em.nombre AS nombre_patron, em.apellidos AS apellidos_patron FROM Embarcaciones e LEFT JOIN Empleado em ON e.id_patron_asignado = em.id_empleado
embarcaciones.eliminar=DELETE FROM Embarcaciones WHERE matricula = ?
embarcaciones.actualizar=UPDATE Embarcaciones SET tipo_embarcacion = ?, nombre = ?, numero_plazas = ?, dimensiones = ? WHERE matricula = ?
embarcaciones.asignar.patron=UPDATE Embarcaciones SET id_patron_asignado = ? WHERE matricula = ?
embarcaciones.liberar.patron=UPDATE Embarcaciones SET id_patron_asignado = NULL WHERE matricula = ?
embarcaciones.obtener.por.patron=SELECT * FROM Embarcaciones WHERE id_patron_asignado = ?

# =============================================================================
# ASIGNACIONES (PATRÓN ↔ EMBARCACIÓN) - SOLO HISTORIAL
# =============================================================================
asignacion.obtener.patron.actual=SELECT e.* FROM Embarcaciones emb JOIN Empleado e ON emb.id_patron_asignado = e.id_empleado WHERE emb.matricula = ?
asignacion.obtener.patron.embarcacion=SELECT id_patron_asignado FROM Embarcaciones WHERE matricula = ?
asignacion.patron.yaAsignado=SELECT COUNT(*) FROM Embarcaciones WHERE id_patron_asignado = ?
asignacion.insertar.historial=INSERT INTO Asignacion (matricula_embarcacion, id_empleado, fecha_asignacion) VALUES (?, ?, CURDATE())
asignacion.finalizar.historial=UPDATE Asignacion SET fecha_fin_asignacion = CURDATE() WHERE matricula_embarcacion = ? AND fecha_fin_asignacion IS NULL
asignacion.obtener.historial.embarcacion=SELECT a.*, e.nombre AS nombre_patron, e.apellidos AS apellidos_patron FROM Asignacion a JOIN Empleado e ON a.id_empleado = e.id_empleado WHERE a.matricula_embarcacion = ? ORDER BY a.fecha_asignacion DESC
asignacion.insertar=INSERT INTO Asignacion (matricula_embarcacion, id_empleado, fecha_asignacion, fecha_fin_asignacion) VALUES (?, ?, ?, ?)
# =============================================================================
# RESERVAS (ACTIVIDADES)
# =============================================================================

reservas.insertar=INSERT INTO Reserva (id_socio_solicitante, plazas_solicitadas, proposito_actividad, precio_total, matricula_embarcacion, fecha_reserva, id_empleado) VALUES (?, ?, ?, ?, ?, ?, ?)

reservas.verificar.disponibilidad=SELECT COUNT(*) FROM Reserva WHERE matricula_embarcacion = ? AND fecha_reserva = ?

reservas.verificar.patron.asignado=SELECT COUNT(*) FROM Embarcaciones WHERE matricula = ? AND id_patron_asignado IS NOT NULL

reservas.obtener.patron.asignado=SELECT id_patron_asignado FROM Embarcaciones WHERE matricula = ?

reservas.obtener.embarcaciones.disponibles=SELECT e.matricula FROM Embarcaciones e WHERE e.id_patron_asignado IS NOT NULL AND e.matricula NOT IN (SELECT r.matricula_embarcacion FROM Reserva r WHERE r.fecha_reserva = ?)
reservas.verificar.disponibilidad.rango=SELECT COUNT(*) FROM Reserva WHERE matricula_embarcacion = ? AND fecha_reserva BETWEEN ? AND ?
reservas.obtener.todas=SELECT r.*, s.nombre AS nombre_socio, s.apellidos AS apellidos_socio, e.nombre AS nombre_embarcacion FROM Reserva r JOIN Socios s ON r.id_socio_solicitante = s.id_socio JOIN Embarcaciones e ON r.matricula_embarcacion = e.matricula ORDER BY r.fecha_reserva DESC
# =============================================================================
# ALQUILERES
# =============================================================================
alquileres.insertar=INSERT INTO Alquiler (id_socio_titular, matricula_embarcacion, fecha_inicio, fecha_fin, plazas_solicitadas, precio_total) VALUES (?, ?, ?, ?, ?, ?)

alquileres.obtener.futuros=SELECT a.id_alquiler, a.id_socio_titular, s.dni, a.matricula_embarcacion, a.fecha_inicio, a.fecha_fin, a.plazas_solicitadas, a.precio_total FROM Alquiler a JOIN Socios s ON a.id_socio_titular = s.id_socio WHERE a.fecha_inicio >= CURDATE() ORDER BY a.fecha_inicio ASC

alquileres.obtener.por.embarcacion=SELECT a.id_alquiler, a.id_socio_titular, s.dni, a.matricula_embarcacion, a.fecha_inicio, a.fecha_fin, a.plazas_solicitadas, a.precio_total FROM Alquiler a JOIN Socios s ON a.id_socio_titular = s.id_socio WHERE a.matricula_embarcacion = ? AND a.fecha_fin >= CURDATE() ORDER BY a.fecha_inicio ASC

alquileres.obtener.por.socio=SELECT a.id_alquiler, a.id_socio_titular, s.dni, a.matricula_embarcacion, a.fecha_inicio, a.fecha_fin, a.plazas_solicitadas, a.precio_total FROM Alquiler a JOIN Socios s ON a.id_socio_titular = s.id_socio WHERE s.dni = ? ORDER BY a.fecha_inicio DESC

alquileres.verificar.disponibilidad=SELECT COUNT(*) FROM Alquiler WHERE matricula_embarcacion = ? AND NOT (fecha_fin < ? OR fecha_inicio > ?)

alquileres.obtener.todos=SELECT a.id_alquiler, a.id_socio_titular, s.dni, s.nombre AS nombre_socio, s.apellidos AS apellidos_socio, a.matricula_embarcacion, e.nombre AS nombre_embarcacion, a.fecha_inicio, a.fecha_fin, a.plazas_solicitadas, a.precio_total FROM Alquiler a JOIN Socios s ON a.id_socio_titular = s.id_socio JOIN Embarcaciones e ON a.matricula_embarcacion = e.matricula ORDER BY a.fecha_inicio DESC

alquileres.contar.activos.por.socio=SELECT COUNT(*) FROM Alquiler WHERE id_socio_titular = ? AND fecha_fin >= ?

# =============================================================================
# TRIPULANTES DE ALQUILER
# =============================================================================
tripulantes.insertar=INSERT INTO Alquiler_Tripulantes (id_alquiler, dni_tripulante) VALUES (?, ?)
tripulantes.obtener.por.alquiler=SELECT at.*, s.nombre, s.apellidos FROM Alquiler_Tripulantes at JOIN Socios s ON at.dni_tripulante = s.dni WHERE at.id_alquiler = ?
tripulantes.contar.por.alquiler=SELECT COUNT(*) FROM Alquiler_Tripulantes WHERE id_alquiler = ?
tripulantes.verificar.existencia=SELECT COUNT(*) FROM Alquiler_Tripulantes WHERE id_alquiler = ? AND dni_tripulante = ?
tripulantes.eliminar.por.alquiler=DELETE FROM Alquiler_Tripulantes WHERE id_alquiler = ?
tripulantes.obtener.alquileres.con.tripulantes=SELECT a.id_alquiler, s_titular.dni AS dni_titular, s_titular.nombre AS nombre_titular, a.matricula_embarcacion, a.fecha_inicio, a.fecha_fin, COUNT(at.dni_tripulante) + 1 AS total_tripulantes FROM Alquiler a JOIN Socios s_titular ON a.id_socio_titular = s_titular.id_socio LEFT JOIN Alquiler_Tripulantes at ON a.id_alquiler = at.id_alquiler GROUP BY a.id_alquiler

# =============================================================================
# INFORMES Y ESTADÍSTICAS
# =============================================================================
informes.embarcaciones.con_mas_reservas=SELECT e.nombre, COUNT(r.id_reserva) AS total_reservas FROM Embarcaciones e JOIN Reserva r ON e.matricula = r.matricula_embarcacion GROUP BY e.nombre ORDER BY total_reservas DESC
informes.patrones.mas_asignados=SELECT em.nombre, em.apellidos, COUNT(a.id_empleado) AS total_asignaciones FROM Empleado em JOIN Asignacion a ON em.id_empleado = a.id_empleado GROUP BY em.nombre, em.apellidos ORDER BY total_asignaciones DESC
informes.socios.mas_activos=SELECT s.nombre, s.apellidos, COUNT(r.id_reserva) AS total_reservas FROM Socios s JOIN Reserva r ON s.id_socio = r.id_socio_solicitante GROUP BY s.nombre, s.apellidos ORDER BY total_reservas DESC