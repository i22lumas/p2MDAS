<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Socio - Club Náutico</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"> 
</head>
<body>
    <div class="form-container main-container">
        <h1>Inscripción de Socio Individual</h1>
        <form th:action="@{/addSocio}" th:object="${newSocio}" method="post">
            
            <label for="nombre">Nombre:</label>
            <input id="nombre" type="text" th:field="*{nombre}" required>

            <label for="apellidos">Apellidos:</label>
            <input id="apellidos" type="text" th:field="*{apellidos}" required>

            <label for="dni">DNI:</label>
            <input id="dni" type="text" th:field="*{dni}" required>
            
            <label for="direccion">Dirección:</label>
            <textarea id="direccion" th:field="*{direccion}" rows="3" required></textarea>

            <label for="fechaNacimiento">Fecha de Nacimiento (Mayor de Edad):</label>
            <input id="fechaNacimiento" type="date" th:field="*{fechaNacimiento}" required>

            <div class="checkbox-group">
                <input id="esPatron" type="checkbox" th:field="*{esPatron}">
                <label for="esPatron">¿Tiene Título de Patrón de Embarcación?</label>
            </div>

            <input type="submit" value="Inscribir Socio">
        </form>
        <a href="/" class="back-link">Volver al inicio</a>
    </div>
</body>
</html>
