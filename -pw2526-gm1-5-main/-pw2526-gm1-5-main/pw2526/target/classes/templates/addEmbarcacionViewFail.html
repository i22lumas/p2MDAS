<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embarcación No Añadida - Club Náutico</title>
<link rel="stylesheet" th:href="@{/css/style.css}" />    
</head>
<body>
    <div class="result-box main-container">
        <h1 class="header-error">Añadir Embarcación: Error</h1>
        <div th:if="${Embarcacion != null}" class="error-message">
            <p>La embarcación ya existe en la base de datos. Matrícula encontrada:</p>
            <p th:text="${Embarcacion.Matricula}"></p>
        </div>
        <div class="actions">
            <a href="/addEmbarcacion" class="btn">Volver al formulario</a>
            <a href="/" class="btn">Volver al inicio</a>
        </div>
    </div>
</body>
</html>
