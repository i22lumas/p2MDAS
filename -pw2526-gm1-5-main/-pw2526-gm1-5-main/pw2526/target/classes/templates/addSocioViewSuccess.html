<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción Exitosa - Club Náutico</title>
<link rel="stylesheet" th:href="@{/css/style.css}" />    
</head>
<body>
    <div class="result-box main-container">
        <h1 class="header-success">Inscripción de Socio: Éxito</h1>
        <div class="success-message">
            <p>El socio <strong th:text="${Socio.nombre + ' ' + Socio.apellidos}"></strong> ha sido añadido correctamente.</p>
        </div>

        <div class="actions">
            <a href="/addSocio" class="btn">Inscribir otro socio</a>
            <a href="/" class="btn">Volver al Menú Principal</a>
        </div>
    </div>
</body>
</html>
